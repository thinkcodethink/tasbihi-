<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasbih Counter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="background-mesh"></div>
    <div class="container">
        <div class="header">
            <h1>TASBIH COUNTER</h1>
            <button id="sound-toggle" class="icon-btn" title="Toggle Sound">
                <svg id="sound-icon-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                <svg id="sound-icon-off" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"></line><polygon points="9 9 11 5 11 19 10 18.18"></polygon><path d="M15.54 8.46a5 5 0 0 1 5.8 5.8"></path><path d="M19.07 4.93a10 10 0 0 1 1.76 11.23"></path><path d="M2 9h4l5 4"></path></svg>
            </button>
        </div>
        
        <div class="tasbih-selector">
            <select id="tasbih-type">
                <option value="custom">Free Count</option>
                <option value="subhanallah">Subhanallah (33)</option>
                <option value="alhamdulillah">Alhamdulillah (33)</option>
                <option value="allahuakbar">Allahu Akbar (34)</option>
                <option value="astaghfirullah">Astaghfirullah (100)</option>
            </select>
        </div>
        
        <div class="counter-wrapper">
            <svg class="progress-ring" width="220" height="220">
                <circle class="progress-ring__circle" stroke="currentColor" stroke-width="6" fill="transparent" r="104" cx="110" cy="110"/>
            </svg>
            <div class="counter-content">
                <span class="label">TOTAL BEADS</span>
                <div id="counter" class="counter-number">0</div>
                <div id="target-display" style="display: none;">/ 0</div>
            </div>
        </div>

        <div class="controls">
            <button id="reset-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                Reset
            </button>
            <button id="increment-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Increment
            </button>
        </div>
        
        <div class="premium-wrapper">
            <button id="premium-btn">Unlock Premium Theme (50 Stars)</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
