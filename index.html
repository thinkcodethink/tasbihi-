<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasbih Counter</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/htmx.org"></script>
</head>
<body>
    <div class="container">
        <h1>Tasbih Counter</h1>
        <div id="counter" hx-get="/counter" hx-swap="outerHTML">0</div>
        <button hx-post="/increment" hx-trigger="click" hx-target="#counter" hx-swap="outerHTML">Increment</button>
        <button hx-post="/reset" hx-trigger="click" hx-target="#counter" hx-swap="outerHTML">Reset</button>
    </div>
</body>
</html>
